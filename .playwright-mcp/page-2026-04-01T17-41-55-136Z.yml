        - paragraph [ref=e307]: "The authentication system is the security backbone of the entire application. It implements a multi-layered approach: bcrypt password hashing with configurable salt rounds for secure credential storage, JWT tokens with short-lived access tokens and longer-lived refresh tokens for session management, and middleware-based route protection that validates tokens on every protected request. The registration flow includes email uniqueness validation, password strength requirements, and a verification email loop. The login flow uses constant-time comparison for password checking to prevent timing attacks. Sessions are stateless via JWT, meaning the server does not need to store session data -- the token itself contains the user identity, signed with a secret key. Trade-offs in this design include choosing JWTs over server-side sessions (better horizontal scalability but harder to revoke), bcrypt over argon2 (wider library support but slightly less resistant to GPU attacks), and storing refresh tokens in httpOnly cookies rather than localStorage (XSS-resistant but requires CSRF protection)."
