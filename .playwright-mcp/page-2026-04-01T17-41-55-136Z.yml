      - paragraph [ref=e272]: The auth layer implements a stateless JWT strategy with access/refresh token rotation. Access tokens are short-lived (15 min) and carried in Authorization headers; refresh tokens are stored in httpOnly secure cookies with SameSite=Strict to mitigate XSS and CSRF vectors. Password hashing uses bcrypt with 12 salt rounds, providing ~300ms hash time to resist brute-force attacks. The AuthService is injected into route handlers via dependency injection, enabling isolated unit testing with mocked repositories. Token revocation is handled via a server-side denylist checked in the auth middleware, with entries TTL-matched to the token expiry to keep the list bounded. Rate limiting on /login (5 attempts per 15 min per IP) is enforced at the reverse-proxy layer.
