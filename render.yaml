services:
  - type: web
    name: codebase-explorer-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build:server
    startCommand: node server-dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3007"
      - key: CORS_ORIGIN
        value: https://codebase-explorer-five.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
