<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codebase Explorer — Graph Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F3EEEA;
    --bg-2: #EAE3DC;
    --ink: #29261b;
    --ink-2: #5a544a;
    --ink-3: #8a8175;
    --line: rgba(41, 38, 27, 0.08);
    --line-strong: rgba(41, 38, 27, 0.14);
    --card: #FBF8F4;
    --shadow-sm: 0 1px 2px rgba(41, 38, 27, 0.06), 0 4px 14px rgba(41, 38, 27, 0.06);
    --shadow-md: 0 2px 6px rgba(41, 38, 27, 0.08), 0 16px 40px rgba(41, 38, 27, 0.12);
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-feature-settings: 'cv02', 'cv03', 'cv04';
    overflow: hidden;
  }
  kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 1px 5px;
    border: 1px solid var(--line-strong);
    border-bottom-width: 2px;
    border-radius: 4px;
    background: var(--card);
    color: var(--ink-2);
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Top bar */
  .topbar {
    height: 60px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    z-index: 10;
  }
  .tb-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .tb-home {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink-2);
  }
  .tb-title { font-weight: 600; font-size: 14px; }
  .tb-sub { font-size: 11.5px; color: var(--ink-3); margin-top: 1px;
    max-width: 560px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tb-progress { flex: 1; max-width: 260px; margin: 0 auto; }
  .tb-progress-label { font-size: 10.5px; color: var(--ink-3); text-align: center; margin-bottom: 4px; letter-spacing: 0.02em; }
  .tb-progress-bar { height: 4px; background: var(--line); border-radius: 99px; overflow: hidden; }
  .tb-progress-fill {
    height: 100%; background: linear-gradient(90deg, #9A6B78, #6E8A6A);
    border-radius: 99px; transition: width 320ms cubic-bezier(.2,.8,.2,1);
  }
  .tb-right { display: flex; gap: 6px; margin-left: auto; }
  .tb-btn {
    appearance: none;
    padding: 7px 14px;
    font: 500 12px 'Inter', sans-serif;
    border: 1px solid var(--line-strong);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    cursor: pointer;
    transition: background 120ms, transform 120ms;
  }
  .tb-btn:hover { background: var(--bg-2); }
  .tb-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .tb-btn.primary:hover { background: #3f3a2e; }

  /* Stage */
  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 30% 20%, rgba(154, 107, 120, 0.04), transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(110, 138, 106, 0.05), transparent 55%),
      var(--bg);
  }

  /* Graph root */
  .graph-root {
    position: absolute; inset: 0;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .graph-root:active { cursor: grabbing; }
  .graph-root svg { overflow: visible; }

  .node-label {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    pointer-events: none;
    paint-order: stroke;
    stroke: var(--bg);
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .node-sublabel {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    fill: var(--ink-3);
    pointer-events: none;
    paint-order: stroke;
    stroke: var(--bg);
    stroke-width: 2.5px;
  }
  .order-badge {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    fill: var(--bg);
    pointer-events: none;
  }
  .lane-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    pointer-events: none;
    opacity: 0.7;
  }
  .edge-label {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    font-weight: 500;
    pointer-events: none;
  }

  .node {
    transition: opacity 220ms ease;
  }
  .node:hover circle { filter: brightness(1.05); }

  /* Viewport controls */
  .viewport-controls {
    position: absolute;
    left: 16px; bottom: 16px;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    padding: 6px;
    background: rgba(251, 248, 244, 0.86);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
  }
  .viewport-controls button {
    appearance: none;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 0; background: transparent;
    color: var(--ink-2);
    border-radius: 6px;
    cursor: pointer;
  }
  .viewport-controls button:hover { background: var(--bg-2); color: var(--ink); }
  .vc-divider { width: 18px; height: 1px; background: var(--line); margin: 2px 0; }
  .zoom-track {
    width: 2px; height: 44px; background: var(--line); border-radius: 1px;
    display: flex; align-items: flex-end; overflow: hidden;
  }
  .zoom-fill { width: 100%; background: var(--ink-2); border-radius: 1px; transition: height 140ms ease-out; }

  /* Inspector */
  .inspector {
    position: absolute;
    top: 14px; right: 14px;
    width: 340px;
    max-height: calc(100% - 28px);
    padding: 18px 20px 16px;
    background: rgba(251, 248, 244, 0.96);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow-md);
    display: flex; flex-direction: column;
    animation: insp-in 220ms cubic-bezier(.2,.8,.2,1);
  }
  @keyframes insp-in {
    from { opacity: 0; transform: translateY(-8px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }
  .insp-head { display: flex; align-items: center; justify-content: space-between; }
  .insp-crumb { display: flex; align-items: center; gap: 10px; }
  .insp-order-chip {
    width: 22px; height: 22px;
    border-radius: 8px;
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 700;
  }
  .insp-step { font-size: 11px; color: var(--ink-3); letter-spacing: 0.02em; }
  .insp-close {
    appearance: none; background: transparent; border: 0;
    width: 26px; height: 26px; border-radius: 6px;
    color: var(--ink-3); cursor: pointer;
  }
  .insp-close:hover { background: var(--bg-2); color: var(--ink); }
  .insp-title {
    margin: 10px 0 6px;
    font-size: 20px; font-weight: 600; letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .insp-meta { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--ink-3); }
  .insp-chip {
    padding: 2px 8px; border-radius: 99px;
    font-size: 10.5px; font-weight: 600;
    text-transform: capitalize;
    letter-spacing: 0.01em;
  }
  .insp-meta-sep { opacity: 0.4; }
  .insp-summary {
    margin: 14px 0 14px;
    color: var(--ink-2);
    font-size: 13.5px;
    line-height: 1.55;
    text-wrap: pretty;
  }
  .insp-expand {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    font: 500 12px 'Inter', sans-serif;
    background: transparent;
    border: 1.5px dashed;
    border-radius: 8px;
    cursor: pointer;
    transition: background 120ms;
  }
  .insp-expand:hover { background: rgba(41,38,27,0.04); }
  .insp-divider { height: 1px; background: var(--line); margin: 16px -20px 14px; }
  .insp-nav { display: flex; gap: 8px; }
  .insp-nav-btn {
    appearance: none;
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 12px;
    font: 500 12px 'Inter', sans-serif;
    border: 1px solid var(--line-strong);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    cursor: pointer;
    transition: background 120ms;
  }
  .insp-nav-btn:hover:not(:disabled) { background: var(--bg-2); }
  .insp-nav-btn:disabled { opacity: 0.35; cursor: default; }
  .insp-nav-btn.primary {
    color: #fff; border-color: transparent;
    flex: 1.4;
  }
  .insp-nav-btn.primary:hover:not(:disabled) { filter: brightness(0.94); }

  /* Next hint */
  .next-hint {
    position: absolute;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px;
    background: rgba(251, 248, 244, 0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 99px;
    box-shadow: var(--shadow-sm);
    font-size: 12px; color: var(--ink-2);
    animation: hint-in 400ms 300ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes hint-in {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }
  .next-hint-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #9A6B78;
    animation: dot-pulse 1.6s infinite ease-in-out;
    box-shadow: 0 0 0 0 rgba(154, 107, 120, 0.4);
  }
  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(154, 107, 120, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(154, 107, 120, 0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="layouts.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="viewport.jsx"></script>
<script type="text/babel" src="graph.jsx"></script>
<script type="text/babel" src="inspector.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
